// ── PARSE EXCEL/CSV ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("
");
  if (lines.length < 2) return [];
  const sep = lines[0].includes(";") ? ";" : ",";
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g, ""));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(sep).map(v => v.trim().replace(/^"|"$/g, ""));
    if (vals.every(v => !v)) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = vals[idx] || ""; });
    rows.push(obj);
  }
  return rows;
}

function mapRow(raw, idx, existingIds) {
  const get = (...keys) => {
    for (const k of keys) {
      const match = Object.keys(raw).find(rk => rk.includes(k));
      if (match && raw[match]) return raw[match];
    }
    return "";
  };
  const newId = (existingIds.length ? Math.max(...existingIds) : 0) + idx + 1;
  return {
    id: newId,
    codigo: get("codigo", "sol", "code"),
    centroCosto: get("centrocosto", "centro", "cc"),
    faena: get("faena", "obra", "proyecto"),
    solicitadoPor: get("solicitado", "solicitante", "por"),
    origen: get("origen", "area", "tipo"),
    maquina: get("maquina", "equipo"),
    item: parseInt(get("item", "nitem", "n")) || idx + 1,
    cantidad: parseFloat(get("cantidad", "cant", "qty")) || 0,
    unidad: get("unidad", "um", "ud"),
    descripcion: get("descripcion", "desc", "nombre"),
    estado: "Pendiente",
    documentos: get("documento", "doc", "oc", "ref"),
    fechaIngreso: new Date().toISOString().split("T")[0],
  };
}

// ── PUBLIC VIEW ────────────────────────────────────────────────────────────────
function PublicView({ data }) {
  const [searchCodigo, setSearchCodigo] = useState("");
  const [filtCC, setFiltCC] = useState("");
  const [filtEstado, setFiltEstado] = useState("");
  const [filtOrigen, setFiltOrigen] = useState("");
  const [filtItem, setFiltItem] = useState("");
  const [expandedCodes, setExpandedCodes] = useState({});

  const centrosCosto = useMemo(() => [...new Set(data.map(d => d.centroCosto))].sort(), [data]);
  const origenes = useMemo(() => [...new Set(data.map(d => d.origen))].filter(Boolean).sort(), [data]);

  const filtered = useMemo(() => {
    return data.filter(r => {
      if (searchCodigo && !r.codigo.toLowerCase().includes(searchCodigo.toLowerCase())) return false;
      if (filtCC && r.centroCosto !== filtCC) return false;
      if (filtEstado && r.estado !== filtEstado) return false;
      if (filtOrigen && r.origen !== filtOrigen) return false;
      if (filtItem && !r.descripcion.toLowerCase().includes(filtItem.toLowerCase())) return false;
      return true;
    });
  }, [data, searchCodigo, filtCC, filtEstado, filtOrigen, filtItem]);

  // Group by codigo
  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(r => {
      if (!map[r.codigo]) map[r.codigo] = [];
      map[r.codigo].push(r);
    });
    return map;
  }, [filtered]);

  const stats = useMemo(() => ({
    total: data.length,
    pendiente: data.filter(d => d.estado === "Pendiente").length,
    enProceso: data.filter(d => d.estado === "En Proceso").length,
    completada: data.filter(d => d.estado === "Completada").length,
  }), [data]);

  const toggleCode = (codigo) => setExpandedCodes(prev => ({ ...prev, [codigo]: !prev[codigo] }));

  const inputStyle = { background: "#0D1117", border: "1px solid #30363D", borderRadius: 7, padding: "7px 12px", color: "#E6EDF3", fontSize: 12, fontFamily: "inherit", width: "100%" };
  const selectStyle = { ...inputStyle, cursor: "pointer" };

  return (
    <div style={{ maxWidth: 1400, margin: "0 auto", padding: "24px 20px", animation: "fadeIn 0.4s ease" }}>
      {/* STATS */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
        {[
          { label: "TOTAL ÍTEMS", val: stats.total, color: "#8B949E" },
          { label: "PENDIENTE", val: stats.pendiente, color: "#F59E0B" },
          { label: "EN PROCESO", val: stats.enProceso, color: "#3B82F6" },
          { label: "COMPLETADA", val: stats.completada, color: "#10B981" },
        ].map(s => (
          <div key={s.label} style={{ background: "#161B22", border: "1px solid #21262D", borderRadius: 10, padding: "16px 20px" }}>
            <div style={{ fontSize: 9, color: "#484F58", letterSpacing: "0.15em", marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 32, fontWeight: 800, color: s.color }}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* FILTERS */}
      <div style={{ background: "#161B22", border: "1px solid #21262D", borderRadius: 10, padding: 16, marginBottom: 20 }}>
        <div style={{ fontSize: 10, color: "#484F58", letterSpacing: "0.15em", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
          <Icon name="filter" size={12} /> FILTROS
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr 1fr 1.5fr", gap: 10 }}>
          <div>
            <div style={{ fontSize: 10, color: "#8B949E", marginBottom: 4 }}>Código Solicitud</div>

          </div>

            <div style={{ fontSize: 10, color: "#8B949E", marginBottom: 4 }}>Buscar Ítem / Descripción</div>
            <div style={{ position: "relative" }}>
              <input value={filtItem} onChange={e => setFiltItem(e.target.value)} placeholder="Filtro hidráulico, cable..." style={{ ...inputStyle, paddingLeft: 32 }} />
              <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#484F58" }}><Icon name="search" size={13} /></span>
            </div>
          </div>
        </div>
      </div>

      {/* SOLICITUDES AGRUPADAS */}
      <div style={{ fontSize: 11, color: "#484F58", marginBottom: 12, letterSpacing: "0.1em" }}>
        {Object.keys(grouped).length} solicitud(es) · {filtered.length} ítem(s)
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {Object.entries(grouped).map(([codigo, items]) => {
          const first = items[0];
          const isOpen = expandedCodes[codigo] !== false; // default open
          const allEstados = [...new Set(items.map(i => i.estado))];
          return (
            <div key={codigo} style={{ background: "#161B22", border: "1px solid #21262D", borderRadius: 10, overflow: "hidden" }}>
              {/* HEADER ROW */}
              <div onClick={() => toggleCode(codigo)} style={{ padding: "12px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12, background: isOpen ? "rgba(245,166,35,0.04)" : "transparent", transition: "background 0.2s" }}>
                <span style={{ color: "#484F58", transition: "transform 0.2s", transform: isOpen ? "rotate(0deg)" : "rotate(-90deg)", display: "inline-flex" }}><Icon name="chevron" size={14} /></span>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, color: "#F5A623", letterSpacing: "0.08em" }}>{codigo}</div>
                <div style={{ height: 16, width: 1, background: "#21262D" }} />
                <div style={{ fontSize: 11, color: "#8B949E" }}>{first.faena}</div>
                <div style={{ height: 16, width: 1, background: "#21262D" }} />
                <div style={{ fontSize: 11, color: "#8B949E" }}>{first.centroCosto}</div>
                <div style={{ height: 16, width: 1, background: "#21262D" }} />
                <div style={{ fontSize: 11, color: "#8B949E" }}>Solicitado por: <span style={{ color: "#E6EDF3" }}>{first.solicitadoPor}</span></div>
                {first.maquina && <><div style={{ height: 16, width: 1, background: "#21262D" }} /><div style={{ fontSize: 11, color: "#8B949E" }}>Máq: <span style={{ color: "#E6EDF3" }}>{first.maquina}</span></div></>}
                <div style={{ height: 16, width: 1, background: "#21262D" }} />
                <div style={{ fontSize: 11 }}>
                  <span style={{ padding: "2px 8px", background: "rgba(245,166,35,0.1)", borderRadius: 4, color: "#8B949E", border: "1px solid #30363D" }}>{first.origen}</span>
                </div>
                <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center" }}>
                  {allEstados.map(e => <EstadoBadge key={e} estado={e} />)}
                  <span style={{ fontSize: 10, color: "#484F58", marginLeft: 4 }}>{items.length} ítem{items.length > 1 ? "s" : ""}</span>
                </div>
              </div>
              {/* ITEMS TABLE */}
              {isOpen && (
                <div style={{ borderTop: "1px solid #21262D" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: "#0D1117" }}>
                        {["N° ÍTEM", "CANT.", "UM", "DESCRIPCIÓN", "ESTADO", "DOCUMENTOS", "FECHA"].map(h => (
                          <th key={h} style={{ padding: "8px 12px", textAlign: "left", fontSize: 9, color: "#484F58", letterSpacing: "0.12em", fontWeight: 600, borderBottom: "1px solid #21262D" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {items.sort((a, b) => a.item - b.item).map((row, i) => (
                        <tr key={row.id} className="row-hover" style={{ borderBottom: i < items.length - 1 ? "1px solid #21262D" : "none", background: "transparent", transition: "background 0.15s" }}>
                          <td style={{ padding: "9px 12px", color: "#F5A623", fontWeight: 600 }}>{row.item}</td>
                          <td style={{ padding: "9px 12px", color: "#E6EDF3" }}>{row.cantidad}</td>
                          <td style={{ padding: "9px 12px", color: "#8B949E" }}>{row.unidad}</td>
                          <td style={{ padding: "9px 12px", color: "#E6EDF3", maxWidth: 400 }}>{row.descripcion}</td>
                          <td style={{ padding: "9px 12px" }}><EstadoBadge estado={row.estado} /></td>
                          <td style={{ padding: "9px 12px", color: "#8B949E", fontSize: 11 }}>{row.documentos || "—"}</td>
                          <td style={{ padding: "9px 12px", color: "#484F58", fontSize: 11 }}>{row.fechaIngreso}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
        {Object.keys(grouped).length === 0 && (
          <div style={{ textAlign: "center", padding: 60, color: "#484F58" }}>
            <Icon name="box" size={32} />
            <div style={{ marginTop: 12, fontSize: 13 }}>No hay solicitudes con esos filtros</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ADMIN VIEW ────────────────────────────────────────────────────────────────
function AdminView({ data, setData }) {
  const [tab, setTab] = useState("tabla"); // "tabla" | "importar" | "nuevo"
  const [editingId, setEditingId] = useState(null);
  const [editEstado, setEditEstado] = useState({});
  const fileRef = useRef();
  const [importPreview, setImportPreview] = useState(null);
  const [importMsg, setImportMsg] = useState("");
  const [newForm, setNewForm] = useState({ codigo:"", centroCosto:"", faena:"", solicitadoPor:"", origen:"Faena", maquina:"", item:1, cantidad:1, unidad:"UN", descripcion:"", estado:"Pendiente", documentos:"", fechaIngreso: new Date().toISOString().split("T")[0] });
  const [filtCC2, setFiltCC2] = useState("");
  const [filtEst2, setFiltEst2] = useState("");
  const [search2, setSearch2] = useState("");
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  const centrosCosto = useMemo(() => [...new Set(data.map(d => d.centroCosto))].sort(), [data]);

  const filteredAdmin = useMemo(() => data.filter(r => {
    if (filtCC2 && r.centroCosto !== filtCC2) return false;
    if (filtEst2 && r.estado !== filtEst2) return false;
    if (search2 && !r.codigo.toLowerCase().includes(search2.toLowerCase()) && !r.descripcion.toLowerCase().includes(search2.toLowerCase())) return false;
    return true;
  }), [data, filtCC2, filtEst2, search2]);

  const saveEstado = (id) => {
    setData(prev => prev.map(r => r.id === id ? { ...r, estado: editEstado[id] || r.estado } : r));
    setEditingId(null);
  };

  const deleteRow = (id) => {
    setData(prev => prev.filter(r => r.id !== id));
    setConfirmDeleteId(null);
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const rows = parseCSV(text);
      const mapped = rows.map((r, i) => mapRow(r, i, data.map(d => d.id)));
      setImportPreview(mapped);
      setImportMsg(`${mapped.length} filas detectadas`);
    };
    reader.readAsText(file, "UTF-8");
    e.target.value = "";
  };

  const confirmImport = () => {
    if (!importPreview) return;
    setData(prev => [...prev, ...importPreview]);
    setImportPreview(null);
    setImportMsg("✓ Importación exitosa");
    setTab("tabla");
  };

  const addNew = () => {
    const id = data.length ? Math.max(...data.map(d => d.id)) + 1 : 1;
    setData(prev => [...prev, { ...newForm, id }]);
    setNewForm({ codigo:"", centroCosto:"", faena:"", solicitadoPor:"", origen:"Faena", maquina:"", item:1, cantidad:1, unidad:"UN", descripcion:"", estado:"Pendiente", documentos:"", fechaIngreso: new Date().toISOString().split("T")[0] });
    setTab("tabla");
  };

  const exportCSV = () => {
    const headers = ["codigo","centroCosto","faena","solicitadoPor","origen","maquina","item","cantidad","unidad","descripcion","estado","documentos","fechaIngreso"];
    const rows = [headers.join(";"), ...data.map(r => headers.map(h => r[h] ?? "").join(";"))];
    const blob = new Blob([rows.join("
")], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "solicitudes_export.csv"; a.click();
  };

  const inputStyle = { background: "#0D1117", border: "1px solid #30363D", borderRadius: 7, padding: "7px 12px", color: "#E6EDF3", fontSize: 12, fontFamily: "inherit", width: "100%" };
  const selectStyle = { ...inputStyle, cursor: "pointer" };
  const labelStyle = { fontSize: 10, color: "#8B949E", marginBottom: 4 };

  return (
    <div style={{ maxWidth: 1400, margin: "0 auto", padding: "24px 20px", animation: "fadeIn 0.4s ease" }}>
      {/* ADMIN TABS */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "#161B22", border: "1px solid #21262D", borderRadius: 10, padding: 4, width: "fit-content" }}>
        {[["tabla","Gestionar Tabla","edit"],["importar","Importar CSV","upload"],["nuevo","Nuevo Ítem","plus"]].map(([t,label,icon]) => (
          <button key={t} onClick={() => setTab(t)} style={{ background: tab===t ? "#F5A623" : "none", color: tab===t ? "#0D1117" : "#8B949E", border: "none", borderRadius: 7, padding: "7px 16px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: tab===t ? 700 : 400, letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6, transition: "all 0.2s" }}>
            <Icon name={icon} size={12} /> {label.toUpperCase()}
          </button>
        ))}
        <button onClick={exportCSV} className="btn-hover" style={{ background: "none", color: "#8B949E", border: "none", borderRadius: 7, padding: "7px 16px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6, marginLeft: "auto", transition: "all 0.2s" }}>
          <Icon name="download" size={12} /> EXPORTAR
        </button>
      </div>

      {/* TAB: TABLA */}
      {tab === "tabla" && (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <div style={{ position: "relative", flex: 1 }}>
              <input value={search2} onChange={e => setSearch2(e.target.value)} placeholder="Buscar por código o descripción..." style={{ ...inputStyle, paddingLeft: 32 }} />
              <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#484F58" }}><Icon name="search" size={13} /></span>
            </div>
            <select value={filtCC2} onChange={e => setFiltCC2(e.target.value)} style={{ ...selectStyle, width: 160 }}>
              <option value="">Centro de Costo</option>
              {centrosCosto.map(cc => <option key={cc}>{cc}</option>)}
            </select>
            <select value={filtEst2} onChange={e => setFiltEst2(e.target.value)} style={{ ...selectStyle, width: 140 }}>
              <option value="">Estado</option>
              {ESTADOS.map(e => <option key={e}>{e}</option>)}
            </select>
          </div>
          <div style={{ background: "#161B22", border: "1px solid #21262D", borderRadius: 10, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#0D1117" }}>
                  {["CÓDIGO","CC","FAENA","SOLICITADO POR","ORIGEN","ÍT.","CANT.","UM","DESCRIPCIÓN","ESTADO","DOCS","FECHA","ACCIONES"].map(h => (
                    <th key={h} style={{ padding: "10px 10px", textAlign: "left", fontSize: 9, color: "#484F58", letterSpacing: "0.12em", fontWeight: 600, whiteSpace: "nowrap", borderBottom: "1px solid #21262D" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filteredAdmin.map((row, i) => (
                  <tr key={row.id} className="row-hover" style={{ borderBottom: i < filteredAdmin.length - 1 ? "1px solid #21262D" : "none", background: "transparent" }}>
                    <td style={{ padding: "8px 10px", color: "#F5A623", fontWeight: 600, whiteSpace: "nowrap" }}>{row.codigo}</td>
                    <td style={{ padding: "8px 10px", color: "#8B949E", whiteSpace: "nowrap" }}>{row.centroCosto}</td>
                    <td style={{ padding: "8px 10px", color: "#E6EDF3", whiteSpace: "nowrap" }}>{row.faena}</td>
                    <td style={{ padding: "8px 10px", color: "#8B949E", whiteSpace: "nowrap" }}>{row.solicitadoPor}</td>
                    <td style={{ padding: "8px 10px" }}><span style={{ fontSize: 10, padding: "2px 7px", background: "rgba(139,148,158,0.1)", border: "1px solid #30363D", borderRadius: 4, color: "#8B949E" }}>{row.origen}</span></td>
                    <td style={{ padding: "8px 10px", color: "#F5A623" }}>{row.item}</td>
                    <td style={{ padding: "8px 10px", color: "#E6EDF3" }}>{row.cantidad}</td>
                    <td style={{ padding: "8px 10px", color: "#8B949E" }}>{row.unidad}</td>
                    <td style={{ padding: "8px 10px", color: "#E6EDF3", maxWidth: 280 }}>{row.descripcion}</td>
                    <td style={{ padding: "8px 10px" }}>
                      {editingId === row.id ? (
                        <select value={editEstado[row.id] || row.estado} onChange={e => setEditEstado(p => ({ ...p, [row.id]: e.target.value }))}
                          style={{ background: "#0D1117", border: "1px solid #F5A623", borderRadius: 6, padding: "3px 8px", color: "#E6EDF3", fontSize: 11, fontFamily: "inherit", cursor: "pointer" }}>
                          {ESTADOS.map(e => <option key={e}>{e}</option>)}
                        </select>
                      ) : <EstadoBadge estado={row.estado} />}
                    </td>
                    <td style={{ padding: "8px 10px", color: "#8B949E", fontSize: 11 }}>{row.documentos || "—"}</td>
                    <td style={{ padding: "8px 10px", color: "#484F58", fontSize: 11, whiteSpace: "nowrap" }}>{row.fechaIngreso}</td>
                    <td style={{ padding: "8px 10px", whiteSpace: "nowrap" }}>
                      <div style={{ display: "flex", gap: 4 }}>
                        {editingId === row.id ? (
                          <>
                            <button onClick={() => saveEstado(row.id)} style={{ background: "#10B981", border: "none", borderRadius: 5, padding: "4px 8px", color: "#fff", cursor: "pointer", fontSize: 10 }}><Icon name="check" size={11} /></button>
                            <button onClick={() => setEditingId(null)} style={{ background: "#30363D", border: "none", borderRadius: 5, padding: "4px 8px", color: "#8B949E", cursor: "pointer", fontSize: 10 }}><Icon name="x" size={11} /></button>
                          </>
                        ) : (
                          <>
                            <button onClick={() => { setEditingId(row.id); setEditEstado(p => ({ ...p, [row.id]: row.estado })); }} style={{ background: "rgba(245,166,35,0.1)", border: "1px solid rgba(245,166,35,0.2)", borderRadius: 5, padding: "4px 8px", color: "#F5A623", cursor: "pointer" }} title="Editar estado"><Icon name="edit" size={11} /></button>
                            <button onClick={() => setConfirmDeleteId(row.id)} style={{ background: "rgba(248,81,73,0.1)", border: "1px solid rgba(248,81,73,0.2)", borderRadius: 5, padding: "4px 8px", color: "#F85149", cursor: "pointer" }} title="Eliminar"><Icon name="trash" size={11} /></button>
                          </>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filteredAdmin.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#484F58" }}>Sin resultados</div>}
          </div>
          <div style={{ fontSize: 10, color: "#484F58", marginTop: 8 }}>{filteredAdmin.length} de {data.length} registros</div>
        </div>
      )}

      {/* MODAL CONFIRMAR ELIMINACIÓN */}
      {confirmDeleteId !== null && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div style={{ background: "#161B22", border: "1px solid #F85149", borderRadius: 12, padding: 32, width: 340, textAlign: "center", animation: "fadeIn 0.2s ease" }}>
            <div style={{ width: 48, height: 48, background: "rgba(248,81,73,0.1)", border: "1px solid rgba(248,81,73,0.3)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", color: "#F85149" }}>
              <Icon name="trash" size={22} />
            </div>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>¿ELIMINAR ÍTEM?</div>
            <div style={{ fontSize: 12, color: "#8B949E", marginBottom: 24 }}>Esta acción no se puede deshacer.</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirmDeleteId(null)} style={{ flex: 1, background: "#21262D", border: "1px solid #30363D", borderRadius: 8, padding: "10px", color: "#8B949E", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>CANCELAR</button>
              <button onClick={() => deleteRow(confirmDeleteId)} style={{ flex: 1, background: "#F85149", border: "none", borderRadius: 8, padding: "10px", color: "#fff", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 700 }}>ELIMINAR</button>
            </div>
          </div>
        </div>
      )}

      {/* TAB: IMPORTAR */}
      {tab === "importar" && (
        <div style={{ maxWidth: 700 }}>
          <div style={{ background: "#161B22", border: "1px solid #21262D", borderRadius: 10, padding: 28 }}>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 700, marginBottom: 6, letterSpacing: "0.08em" }}>IMPORTAR DESDE CSV / EXCEL</div>
            <div style={{ fontSize: 11, color: "#8B949E", marginBottom: 20, lineHeight: 1.6 }}>
              Exporta tu Excel como <strong style={{ color: "#F5A623" }}>.CSV (separado por comas o punto y coma)</strong>.<br />
              Columnas esperadas (en cualquier orden):<br />
              <code style={{ color: "#F5A623", fontSize: 10 }}>codigo · centroCosto · faena · solicitadoPor · origen · maquina · item · cantidad · unidad · descripcion · documentos · fechaIngreso</code>
            </div>
            <input type="file" ref={fileRef} accept=".csv,.txt" onChange={handleFileUpload} style={{ display: "none" }} />
            <button onClick={() => fileRef.current.click()} className="btn-hover" style={{ background: "rgba(245,166,35,0.1)", border: "1px dashed rgba(245,166,35,0.4)", borderRadius: 10, padding: "20px 32px", color: "#F5A623", cursor: "pointer", fontSize: 12, fontFamily: "inherit", letterSpacing: "0.1em", display: "flex", alignItems: "center", gap: 10, transition: "all 0.2s", width: "100%", justifyContent: "center" }}>
              <Icon name="upload" size={18} /> SELECCIONAR ARCHIVO CSV
            </button>
            {importMsg && <div style={{ marginTop: 12, fontSize: 11, color: importMsg.startsWith("✓") ? "#10B981" : "#8B949E" }}>{importMsg}</div>}
            {importPreview && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 11, color: "#8B949E", marginBottom: 10 }}>Vista previa ({importPreview.length} filas):</div>
                <div style={{ maxHeight: 260, overflowY: "auto", background: "#0D1117", borderRadius: 8, border: "1px solid #30363D", marginBottom: 14 }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                    <thead>
                      <tr>{["Código","CC","Faena","Descripción","Estado"].map(h => <th key={h} style={{ padding: "7px 10px", textAlign: "left", fontSize: 9, color: "#484F58", letterSpacing: "0.1em", borderBottom: "1px solid #21262D" }}>{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {importPreview.slice(0,20).map((r,i) => (
                        <tr key={i} style={{ borderBottom: "1px solid #21262D" }}>
                          <td style={{ padding: "6px 10px", color: "#F5A623" }}>{r.codigo}</td>
                          <td style={{ padding: "6px 10px", color: "#8B949E" }}>{r.centroCosto}</td>
                          <td style={{ padding: "6px 10px", color: "#E6EDF3" }}>{r.faena}</td>
                          <td style={{ padding: "6px 10px", color: "#E6EDF3", maxWidth: 200 }}>{r.descripcion}</td>
                          <td style={{ padding: "6px 10px" }}><EstadoBadge estado={r.estado} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <button onClick={confirmImport} className="btn-hover" style={{ background: "#10B981", border: "none", borderRadius: 8, padding: "10px 24px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 8, transition: "all 0.2s" }}>
                  <Icon name="check" size={14} /> CONFIRMAR IMPORTACIÓN
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* TAB: NUEVO ÍTEM */}
      {tab === "nuevo" && (
        <div style={{ maxWidth: 700 }}>
          <div style={{ background: "#161B22", border: "1px solid #21262D", borderRadius: 10, padding: 28 }}>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 700, marginBottom: 20, letterSpacing: "0.08em" }}>AGREGAR NUEVO ÍTEM</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              {[
                ["Código Solicitud","codigo","text"],["Centro de Costo","centroCosto","text"],
                ["Faena / Área","faena","text"],["Solicitado Por","solicitadoPor","text"],
                ["Documentos Asociados","documentos","text"],["Fecha Ingreso","fechaIngreso","date"],
              ].map(([label, key, type]) => (
                <div key={key}>
                  <div style={labelStyle}>{label.toUpperCase()}</div>
                  <input type={type} value={newForm[key]} onChange={e => setNewForm(p => ({ ...p, [key]: e.target.value }))} style={inputStyle} />
                </div>
              ))}
              <div>
                <div style={labelStyle}>ORIGEN</div>
                <select value={newForm.origen} onChange={e => setNewForm(p => ({ ...p, origen: e.target.value }))} style={selectStyle}>
                  {ORIGENES.map(o => <option key={o}>{o}</option>)}
                </select>
              </div>
              <div>
                <div style={labelStyle}>MÁQUINA (si aplica)</div>
                <input value={newForm.maquina} onChange={e => setNewForm(p => ({ ...p, maquina: e.target.value }))} style={inputStyle} placeholder="CAT 336 #A12" />
              </div>
              <div>
                <div style={labelStyle}>N° ÍTEM</div>
                <input type="number" value={newForm.item} onChange={e => setNewForm(p => ({ ...p, item: parseInt(e.target.value) || 1 }))} style={inputStyle} min={1} />
              </div>
              <div>
                <div style={labelStyle}>ESTADO</div>
                <select value={newForm.estado} onChange={e => setNewForm(p => ({ ...p, estado: e.target.value }))} style={selectStyle}>
                  {ESTADOS.map(e => <option key={e}>{e}</option>)}
                </select>
              </div>
              <div>
                <div style={labelStyle}>CANTIDAD</div>
                <input type="number" value={newForm.cantidad} onChange={e => setNewForm(p => ({ ...p, cantidad: parseFloat(e.target.value) || 0 }))} style={inputStyle} min={0} step="0.01" />
              </div>
              <div>
                <div style={labelStyle}>UNIDAD DE MEDIDA</div>
                <input value={newForm.unidad} onChange={e => setNewForm(p => ({ ...p, unidad: e.target.value }))} style={inputStyle} placeholder="UN, KG, M, L..." />
              </div>
            </div>
            <div style={{ marginTop: 14 }}>
              <div style={labelStyle}>DESCRIPCIÓN</div>
              <input value={newForm.descripcion} onChange={e => setNewForm(p => ({ ...p, descripcion: e.target.value }))} style={{ ...inputStyle, width: "100%" }} placeholder="Descripción del material, equipo, herramienta o servicio..." />
            </div>
            <button onClick={addNew} className="btn-hover" style={{ marginTop: 20, background: "#F5A623", border: "none", borderRadius: 8, padding: "10px 24px", color: "#0D1117", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 8, transition: "all 0.2s" }}>
              <Icon name="save" size={14} /> GUARDAR ÍTEM
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
